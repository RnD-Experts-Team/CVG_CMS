name: Deploy to Production

on:
  push:
    branches:
      - main

# Only one deployment at a time — never cancel an in-progress deploy
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Load SSH private key into the agent (avoids Docker container secret issues)
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # Trust the server's host key
      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Push code to server via rsync (server never needs GitHub credentials)
      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage/app/public' \
            --exclude='storage/logs' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/srv/apps/cvg_cms/

      # Build Docker image, run migrations, and restart containers
      - name: Build & restart containers
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'cd /srv/apps/cvg_cms && bash deploy.sh'

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! SSH into the server and check:"
          echo "  docker logs cvg_cms_app --tail=50"
          echo "  tail -20 /var/log/nginx/backend.cvg.construction.error.log"

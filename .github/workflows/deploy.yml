name: Deploy to Production

on:
  push:
    branches:
      - main

# Only one deployment at a time — never cancel an in-progress deploy
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Push code to server via rsync (server never needs GitHub credentials)
      - name: Sync code to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avz --delete
            --exclude='.git'
            --exclude='.env'
            --exclude='vendor'
            --exclude='node_modules'
            --exclude='storage/app/public'
            --exclude='storage/logs'
          path: ./
          remote_path: /srv/apps/cvg_cms/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: ${{ secrets.SERVER_PORT || 22 }}

      # Build Docker image and restart containers on the server
      - name: Build & restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /srv/apps/cvg_cms
            ./deploy.sh
          script_stop: true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed! SSH into the server and check:"
          echo "  docker logs cvg_cms_app --tail=50"
          echo "  tail -20 /var/log/nginx/backend.cvg.construction.error.log"

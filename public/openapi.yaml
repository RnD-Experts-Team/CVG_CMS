openapi: 3.0.0
info:
  title: Hiring Pizza API
  version: 1.0.0
  description: Comprehensive API for managing hiring requests, employees, and separation requests
  contact:
    name: Hiring Pizza Support
  license:
    name: MIT

servers:
  - url: '{{url}}'
    description: Main API Server
    variables:
      url:
        default: 'http://localhost:8000'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ==================== RESPONSE WRAPPERS ====================
    SuccessResponse:
      type: object
      properties:
        status:
          type: integer
          example: 1
        message:
          type: string
          example: Operation successful
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 0
        message:
          type: string
          example: An error occurred
        data:
          type: object
          nullable: true

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 0
        message:
          type: object
          description: Validation errors object with field names as keys
        data:
          type: object
          nullable: true

    PaginatedResponse:
      type: object
      properties:
        status:
          type: integer
          example: 1
        message:
          type: string
        data:
          type: array
          items:
            type: object
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 10
        total:
          type: integer
          example: 45
        from:
          type: integer
          example: 1
        to:
          type: integer
          example: 10
        links:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                nullable: true
              label:
                type: string
              active:
                type: boolean

    # ==================== AUTH SCHEMAS ====================
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jane.smith@example.com
        password:
          type: string
          format: password
          example: password123

    LoginResponse:
      type: object
      properties:
        status:
          type: integer
          example: 1
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
              example: eyJ0eXAiOiJKV1QiLCJhbGc...

    # ==================== HIRING REQUEST SCHEMAS ====================
    CandidateInput:
      type: object
      required:
        - name
        - contact_number
        - email
      properties:
        id:
          type: integer
          description: Required when updating, omit when creating
        name:
          type: string
          maxLength: 40
          example: John Doe
        contact_number:
          type: string
          maxLength: 30
          example: '09937119592'
        email:
          type: string
          format: email
          example: john.doe@example.com
        notes:
          type: string
          maxLength: 255
          nullable: true
          example: Good communication skills

    CandidateResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        contact_number:
          type: string
        email:
          type: string
        notes:
          type: string
          nullable: true
        approve_status:
          type: string
          enum:
            - pending
            - approved
            - rejected

    NewHireInput:
      type: object
      required:
        - shift_id
        - availability_needed
      properties:
        id:
          type: integer
          description: Required when updating, omit when creating
        shift_id:
          type: integer
          example: 3
          description: Shift ID (e.g., Morning 9 AM - 2 PM)
        availability_needed:
          type: string
          enum:
            - weekday
            - weekends
            - open_availability
          example: weekday
        notes:
          type: string
          maxLength: 255
          nullable: true
          example: Good candidate for morning shift

    NewHireResponse:
      type: object
      properties:
        id:
          type: integer
        shift_id:
          type: integer
        availability_needed:
          type: string
        notes:
          type: string
          nullable: true
        approved_status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        shift:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string

    HiringRequestCreateRequest:
      type: object
      required:
        - desired_start_date
      properties:
        desired_start_date:
          type: string
          format: date
          example: '2026-05-01'
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CandidateInput'
        new_hires:
          type: array
          items:
            $ref: '#/components/schemas/NewHireInput'

    HiringRequestUpdateRequest:
      type: object
      properties:
        desired_start_date:
          type: string
          format: date
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CandidateInput'
        new_hires:
          type: array
          items:
            $ref: '#/components/schemas/NewHireInput'

    HiringRequestResponse:
      type: object
      properties:
        id:
          type: integer
        store_manager_id:
          type: integer
        store_id:
          type: integer
        date_of_request:
          type: string
          format: date-time
        desired_start_date:
          type: string
          format: date
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CandidateResponse'
        newHires:
          type: array
          items:
            $ref: '#/components/schemas/NewHireResponse'
        supervisorApprove:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            approve_status:
              type: boolean
            notes:
              type: string
            approvedBy:
              type: object
        hiringReview:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            is_completed:
              type: boolean
            notes:
              type: string
            date_of_request:
              type: string
              format: date-time
            reviewedBy:
              type: object

    SupervisorDecisionRequest:
      type: object
      required:
        - approve_status
      properties:
        approve_status:
          type: boolean
          example: true
        notes:
          type: string
          maxLength: 255
          nullable: true
        candidates:
          type: array
          nullable: true
          items:
            type: object
            required:
              - id
              - status
            properties:
              id:
                type: integer
              status:
                type: string
                enum:
                  - approved
                  - rejected
        new_hires:
          type: array
          nullable: true
          items:
            type: object
            required:
              - id
              - status
            properties:
              id:
                type: integer
              status:
                type: string
                enum:
                  - approved
                  - rejected

    HiringReviewRequest:
      type: object
      required:
        - is_completed
      properties:
        is_completed:
          type: boolean
          example: true
        notes:
          type: string
          maxLength: 255
          nullable: true
          example: Hiring review completed successfully

    # ==================== EMPLOYEE SCHEMAS ====================
    SalaryInfoInput:
      type: object
      properties:
        salary_date:
          type: string
          format: date
          nullable: true
        base_pay:
          type: number
          format: double
          minimum: 0
          nullable: true
        performance_pay:
          type: number
          format: double
          minimum: 0
          nullable: true

    StatusHistoryInput:
      type: object
      properties:
        status_type_id:
          type: integer
        status_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    AddressInput:
      type: object
      required:
        - address_line_1
        - city
        - state
        - country
      properties:
        address_line_1:
          type: string
          maxLength: 255
          example: '123 Main Street'
        address_line_2:
          type: string
          maxLength: 255
          nullable: true
          example: 'Apt 4B'
        city:
          type: string
          maxLength: 100
          example: 'New York'
        state:
          type: string
          maxLength: 100
          example: 'NY'
        zip_code:
          type: string
          maxLength: 20
          nullable: true
          example: '10001'
        country:
          type: string
          maxLength: 100
          example: 'USA'
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          nullable: true
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          nullable: true
        is_primary:
          type: boolean
          nullable: true

    AddressResponse:
      allOf:
        - $ref: '#/components/schemas/AddressInput'
        - type: object
          properties:
            id:
              type: integer

    ContactInput:
      type: object
      required:
        - contact_type
        - contact_value
      properties:
        contact_type:
          type: string
          maxLength: 50
          example: 'email'
        contact_value:
          type: string
          maxLength: 255
          example: 'john@example.com'
        is_primary:
          type: boolean
          nullable: true

    ContactResponse:
      allOf:
        - $ref: '#/components/schemas/ContactInput'
        - type: object
          properties:
            id:
              type: integer

    NoteInput:
      type: object
      required:
        - notes
      properties:
        notes:
          type: string
          example: 'Employee note'

    NoteResponse:
      type: object
      properties:
        id:
          type: integer
        notes:
          type: string
        created_by:
          type: integer
        created_at:
          type: string
          format: date-time

    FileInput:
      type: object
      required:
        - type_id
        - file
      properties:
        type_id:
          type: integer
        file:
          type: string
          format: binary
        notes:
          type: string
          nullable: true

    FileResponse:
      type: object
      properties:
        id:
          type: integer
        type_id:
          type: integer
        file_path:
          type: string
        notes:
          type: string
          nullable: true

    PaymentInfoInput:
      type: object
      required:
        - account_type
        - routing_number
        - account_number
      properties:
        account_type:
          type: string
          enum:
            - checking
            - saving
        routing_number:
          type: string
          maxLength: 50
        account_number:
          type: string
          maxLength: 50
        is_primary:
          type: boolean
          nullable: true

    PaymentInfoResponse:
      allOf:
        - $ref: '#/components/schemas/PaymentInfoInput'
        - type: object
          properties:
            id:
              type: integer

    EmployeeIdTypeInput:
      type: object
      required:
        - employee_id_type_id
        - id_number
      properties:
        employee_id_type_id:
          type: integer
          example: 1
          description: ID type reference (e.g., Paychecks ID, Altemitrix ID)
        id_number:
          type: string
          maxLength: 255
          example: 'EMP123456'
        is_primary:
          type: boolean
          nullable: true
          example: true

    EmployeeIdTypeResponse:
      allOf:
        - $ref: '#/components/schemas/EmployeeIdTypeInput'
        - type: object
          properties:
            id:
              type: integer
            employeeIdType:
              type: object
              properties:
                id:
                  type: integer
                type_name:
                  type: string

    EmployeeCertificationInput:
      type: object
      required:
        - certification_name
      properties:
        certification_name:
          type: string
          maxLength: 255
          example: 'OSHA Certification'

    EmployeeCertificationResponse:
      allOf:
        - $ref: '#/components/schemas/EmployeeCertificationInput'
        - type: object
          properties:
            id:
              type: integer

    EmployeeCreateRequest:
      type: object
      required:
        - position_id
        - marital_status_id
        - employement_type
        - emp_status_id
        - SSN_number
        - first_name
        - last_name
      properties:
        position_id:
          type: integer
          example: 2
        marital_status_id:
          type: integer
          example: 1
          description: Marital status ID reference
        employement_type:
          type: string
          enum:
            - '1099'
            - W2
          example: W2
          description: Employment type
        T_shirt_size:
          type: string
          enum:
            - XS
            - S
            - M
            - L
            - XL
            - XXL
          nullable: true
          example: M
        emp_status_id:
          type: integer
          example: 3
        SSN_number:
          type: string
          maxLength: 9
          minLength: 9
          example: '123456789'
          description: Social Security Number (encrypted in database)
        first_name:
          type: string
          maxLength: 30
          example: 'John'
        middle_name:
          type: string
          maxLength: 30
          nullable: true
          example: 'A'
        last_name:
          type: string
          maxLength: 30
          example: 'Doe'
        gender:
          type: string
          maxLength: 20
          nullable: true
          enum:
            - male
            - female
            - other
        birth_date:
          type: string
          format: date
          nullable: true
          example: '1990-05-15'
        ids_info:
          type: array
          nullable: true
          description: Employee ID information (e.g., Paychecks ID, Altemitrix ID)
          items:
            $ref: '#/components/schemas/EmployeeIdTypeInput'
        certifications_info:
          type: array
          nullable: true
          description: Employee certifications
          items:
            $ref: '#/components/schemas/EmployeeCertificationInput'
        salary_info:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SalaryInfoInput'
        addresses:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AddressInput'
        contacts:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ContactInput'
        notes:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/NoteInput'
        files:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/FileInput'
        payment_info:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PaymentInfoInput'
        availability:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AvailabilityInput'
        status_history:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/StatusHistoryInput'

    EmployeeUpdateRequest:
      type: object
      properties:
        position_id:
          type: integer
        marital_status_id:
          type: integer
        employement_type:
          type: string
          enum:
            - '1099'
            - W2
        T_shirt_size:
          type: string
          enum:
            - XS
            - S
            - M
            - L
            - XL
            - XXL
        emp_status_id:
          type: integer
        SSN_number:
          type: string
          maxLength: 9
          minLength: 9
        first_name:
          type: string
          maxLength: 30
        middle_name:
          type: string
          maxLength: 30
        last_name:
          type: string
          maxLength: 30
        gender:
          type: string
          enum:
            - male
            - female
            - other
        birth_date:
          type: string
          format: date
        ids_info:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeIdTypeInput'
        certifications_info:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeCertificationInput'
        salary_info:
          type: array
          items:
            $ref: '#/components/schemas/SalaryInfoInput'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressInput'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactInput'
        notes:
          type: array
          items:
            $ref: '#/components/schemas/NoteInput'
        files:
          type: object
          nullable: true
          description: File management object with kept, deleted, and updated files
          properties:
            keptImage:
              type: array
              nullable: true
              items:
                type: integer
              example: [1, 2]
              description: IDs of files to keep
            deletedImage:
              type: array
              nullable: true
              items:
                type: integer
              example: [3, 4]
              description: IDs of files to delete
            updatedImage:
              type: array
              nullable: true
              items:
                type: object
                required:
                  - type_id
                  - file
                properties:
                  type_id:
                    type: integer
                    example: 1
                  notes:
                    type: string
                    nullable: true
                    maxLength: 255
                    example: Employee contract
                  file:
                    type: string
                    format: binary
        payment_info:
          type: array
          items:
            $ref: '#/components/schemas/PaymentInfoInput'
        availability:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityInput'

    AvailabilityInput:
      type: object
      required:
        - shift_id
      properties:
        shift_id:
          type: integer
        notes:
          type: string
          nullable: true
        days:
          type: array
          nullable: true
          items:
            type: string
            enum:
              - sunday
              - monday
              - tuesday
              - wednesday
              - thursday
              - friday
              - saturday

    AvailabilityResponse:
      allOf:
        - $ref: '#/components/schemas/AvailabilityInput'
        - type: object
          properties:
            id:
              type: integer

    EmployeeProfileResponse:
      type: object
      properties:
        id:
          type: integer
        employee_id:
          type: integer
        first_name:
          type: string
        middle_name:
          type: string
          nullable: true
        last_name:
          type: string
        gender:
          type: string
        birth_date:
          type: string
          format: date

    EmployeeResponse:
      type: object
      properties:
        id:
          type: integer
        store_id:
          type: integer
        position_id:
          type: integer
        marital_status_id:
          type: integer
        employement_type:
          type: string
        T_shirt_size:
          type: string
          nullable: true
        emp_status_id:
          type: integer
        SSN_number:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        employeeProfile:
          $ref: '#/components/schemas/EmployeeProfileResponse'
        employeeAddresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressResponse'
        employeeContacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactResponse'
        employeeNotes:
          type: array
          items:
            $ref: '#/components/schemas/NoteResponse'
        employeeFiles:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        employeePaymentInfo:
          type: array
          items:
            $ref: '#/components/schemas/PaymentInfoResponse'
        employeeSalaryInfo:
          type: array
          items:
            $ref: '#/components/schemas/SalaryInfoInput'
        employeeStatusHistory:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistoryInput'
        employeeAvailability:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityResponse'
        employeeIds:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeIdTypeResponse'
        createdCertificationsInfo:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeCertificationResponse'

    CreateEmployeePageResponse:
      type: object
      properties:
        status:
          type: integer
          example: 1
        message:
          type: string
        data:
          type: object
          properties:
            separationReasons:
              type: array
              items:
                type: object
            positions:
              type: array
              items:
                type: object
            stores:
              type: array
              items:
                type: object
            employeeStatuses:
              type: array
              items:
                type: object
            employeeFileTypes:
              type: array
              items:
                type: object
            shifts:
              type: array
              items:
                type: object
            employeeMaritalStatuses:
              type: array
              items:
                type: object
            employeeIdTypes:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  type_name:
                    type: string

    # ==================== SEPARATION REQUEST SCHEMAS ====================
    SeparationAttachmentInput:
      type: object
      required:
        - file
      properties:
        file:
          type: string
          format: binary
        note:
          type: string
          maxLength: 255
          nullable: true

    SeparationAttachmentResponse:
      type: object
      properties:
        id:
          type: integer
        separation_id:
          type: integer
        reason_id:
          type: integer
          nullable: true
        attatchment_path:
          type: string
        attatchment_note:
          type: string
          nullable: true

    SeparationRequestCreateRequest:
      type: object
      required:
        - separation_type
        - reason_type
        - final_work_date
      properties:
        separation_type:
          type: string
          enum:
            - termination
            - resignation
          example: termination
        reason_type:
          type: string
          enum:
            - other
            - resignation
            - termination
          example: other
        reason_title:
          type: string
          maxLength: 255
          nullable: true
          example: 'Policy violation'
        reason_id:
          type: integer
          nullable: true
          description: Required unless reason_type is 'other'
        final_work_date:
          type: string
          format: date
          example: '2026-04-05'
        other_notes:
          type: string
          maxLength: 255
          nullable: true
        attachments:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SeparationAttachmentInput'
        termination_letter:
          type: string
          maxLength: 255
          nullable: true
          description: Required if separation_type is 'termination'
          example: 'Termination approved by management'

    SeparationRequestUpdateRequest:
      type: object
      properties:
        separation_type:
          type: string
          enum:
            - termination
            - resignation
        reason_type:
          type: string
          enum:
            - other
            - resignation
            - termination
        reason_title:
          type: string
          maxLength: 255
        reason_id:
          type: integer
        final_work_date:
          type: string
          format: date
        other_notes:
          type: string
          maxLength: 255
        attachments:
          type: object
          nullable: true
          description: Attachment management object with kept, deleted, and updated attachments
          properties:
            keptAttachment:
              type: array
              nullable: true
              items:
                type: integer
              example: [1, 2]
              description: IDs of attachments to keep
            deletedAttachment:
              type: array
              nullable: true
              items:
                type: integer
              example: [3]
              description: IDs of attachments to delete
            updatedAttachment:
              type: array
              nullable: true
              items:
                type: object
                required:
                  - file
                properties:
                  note:
                    type: string
                    nullable: true
                    maxLength: 255
                    example: Separation document
                  file:
                    type: string
                    format: binary
        termination_letter:
          type: string
          maxLength: 255

    SeparationReasonResponse:
      type: object
      properties:
        id:
          type: integer
        reason_type:
          type: string
        reason_title:
          type: string

    SeparationRequestResponse:
      type: object
      properties:
        id:
          type: integer
        store_manager_id:
          type: integer
        store_id:
          type: integer
        employee_id:
          type: integer
        date_of_request:
          type: string
          format: date-time
        separation_type:
          type: string
        final_work_date:
          type: string
          format: date
        other_notes:
          type: string
          nullable: true
        termination_letter:
          type: string
          nullable: true
        employee:
          $ref: '#/components/schemas/EmployeeResponse'
        separationAttachments:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/SeparationAttachmentResponse'
              - type: object
                properties:
                  reason:
                    $ref: '#/components/schemas/SeparationReasonResponse'
        supervisorApprove:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            accept_status:
              type: boolean
            notes:
              type: string
            approvedBy:
              type: object
        hiringReview:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            is_completed:
              type: boolean
            notes:
              type: string
            date_of_request:
              type: string
              format: date-time
            reviewedBy:
              type: object

    SeparationDecisionRequest:
      type: object
      required:
        - accept_status
      properties:
        accept_status:
          type: boolean
          example: true
        notes:
          type: string
          maxLength: 255
          nullable: true

    SeparationReviewRequest:
      type: object
      required:
        - is_completed
      properties:
        is_completed:
          type: boolean
          example: true
        notes:
          type: string
          maxLength: 255
          nullable: true


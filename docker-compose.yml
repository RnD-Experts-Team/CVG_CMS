networks:
  cvg_network:
    external: true
    name: cvg_network

services:
  cvg_cms:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: cvg_cms:latest
    container_name: cvg_cms_app
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist user uploads
      - ./storage/app/public:/var/www/html/storage/app/public
      # Share storage logs with host
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - cvg_network
    ports:
      - "127.0.0.1:9001:9000"
    depends_on:
      - scheduler
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'test is successful'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Queue worker
  cvg_cms_worker:
    image: cvg_cms:latest
    container_name: cvg_cms_worker
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./storage/app/public:/var/www/html/storage/app/public
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - cvg_network
    depends_on:
      cvg_cms:
        condition: service_healthy

  # Task scheduler (runs every minute via cron)
  scheduler:
    image: cvg_cms:latest
    container_name: cvg_cms_scheduler
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    volumes:
      - ./storage/app/public:/var/www/html/storage/app/public
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - cvg_network
